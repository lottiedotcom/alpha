<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alpha-Gal Ingredient Scanner</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
</head>
<body>
    <div class="container">
        <h1>Alpha-Gal Scanner</h1>
        
        <div class="tab-container">
            <button id="tabPaste" class="tab-btn active">Paste Text</button>
            <button id="tabScan" class="tab-btn">Photo Scan</button>
        </div>

        <div id="viewPaste" class="view-section">
            <p>Paste or edit your product's ingredient list below.</p>
            <textarea id="ingredientInput" placeholder="e.g., Water, Glycerin, Stearic Acid..."></textarea>
            <button id="analyzeBtn" class="primary-btn">Analyze Ingredients</button>
            <button id="clearBtn" class="secondary-btn">Clear Box</button>
        </div>

        <div id="viewScan" class="view-section hidden">
            <p>Take a clear photo of the ingredient list to read the text.</p>
            
            <label class="custom-file-upload">
                <input type="file" id="imageInput" accept="image/*" capture="environment">
                📸 Open Camera / Choose Photo
            </label>
            
            <div id="ocrStatus" class="status-msg hidden">Reading text... please wait.</div>
            <img id="imagePreview" class="hidden" alt="Ingredient preview">
        </div>
        
        <div id="results" class="hidden"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
