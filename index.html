<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alpha-Gal Ingredient Scanner</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
</head>
<body>
    <div class="container">
        <h1>Alpha-Gal Scanner</h1>
        
        <div class="tab-container">
            <button id="tabPaste" class="tab-btn active">Paste Text</button>
            <button id="tabScan" class="tab-btn">Scan Barcode</button>
        </div>

        <div id="viewPaste" class="view-section">
            <p>Paste your product's ingredient list below.</p>
            <textarea id="ingredientInput" placeholder="e.g., Water, Glycerin, Stearic Acid..."></textarea>
            <button id="analyzeBtn" class="primary-btn">Analyze Ingredients</button>
            <button id="clearBtn" class="secondary-btn">Clear Box</button>
        </div>

        <div id="viewScan" class="view-section hidden">
            <p>Scan a product's barcode to automatically fetch and analyze its ingredients.</p>
            <div id="reader"></div>
        </div>
        
        <div id="results" class="hidden"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
