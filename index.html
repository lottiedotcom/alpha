<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alpha-Gal Ingredient Scanner</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>Alpha-Gal Scanner</h1>
        <p>Paste your product's ingredient list below to scan for mammalian derivatives, alpha-gal epitopes, and potential triggers.</p>
        
        <textarea id="ingredientInput" placeholder="Paste ingredients here... (e.g., Water, Glycerin, Stearic Acid, Beef Tallow...)"></textarea>
        
        <button id="scanBtn">Scan Ingredients</button>
        <button id="clearBtn" class="secondary">Clear</button>
        
        <div id="results" class="hidden"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
